<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pitch Shifter Demo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
        }
        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            margin: 10px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        #startBtn { background-color: #4CAF50; color: white; }
        #stopBtn { background-color: #f44336; color: white; display: none; }
        .controls { margin-top: 20px; text-align: center; background: #222; padding: 20px; border-radius: 10px;}
        input[type="range"] { width: 80vw; max-width: 300px; margin: 10px 0; }
    </style>
</head>
<body>

    <h2>Scammer Pitch Shifter</h2>
    <p>Using Granular Synthesis for Male-to-Female shifting.</p>

    <button id="startBtn">Start Microphone</button>
    <button id="stopBtn">Stop Microphone</button>

    <div class="controls">
        <label for="pitchControl">Pitch Shift (Semitones): <span id="pitchValue">4</span></label><br>
        <input type="range" id="pitchControl" min="-12" max="12" value="4" step="1">
        <p style="font-size: 0.8rem; color: #aaa;">+4 to +8 is usually the target for male-to-female.</p>
        
        <br>

        <label for="windowControl">Artifacts (Window Size): <span id="windowValue">0.1</span>s</label><br>
        <input type="range" id="windowControl" min="0.03" max="0.15" value="0.1" step="0.01">
        <p style="font-size: 0.8rem; color: #aaa;">Smaller window = more robotic/metallic glitching.</p>
    </div>

    <script>
        let mic;
        let pitchShift;

        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const pitchControl = document.getElementById('pitchControl');
        const pitchValue = document.getElementById('pitchValue');
        const windowControl = document.getElementById('windowControl');
        const windowValue = document.getElementById('windowValue');

        // Update Pitch
        pitchControl.addEventListener('input', (e) => {
            pitchValue.textContent = e.target.value;
            if (pitchShift) {
                pitchShift.pitch = parseFloat(e.target.value);
            }
        });

        // Update Window Size (The "Glitch" factor)
        windowControl.addEventListener('input', (e) => {
            windowValue.textContent = e.target.value;
            if (pitchShift) {
                pitchShift.windowSize = parseFloat(e.target.value);
            }
        });

        startBtn.addEventListener('click', async () => {
            try {
                // Must be triggered by a user gesture to start Tone.js AudioContext
                await Tone.start();

                // Initialize the microphone input
                mic = new Tone.UserMedia();
                
                // Initialize the Pitch Shifter
                pitchShift = new Tone.PitchShift({
                    pitch: parseFloat(pitchControl.value),
                    windowSize: parseFloat(windowControl.value)
                }).toDestination(); // Route to speakers

                // Open the mic and connect it to the shifter
                await mic.open();
                mic.connect(pitchShift);

                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';

            } catch (err) {
                alert('Microphone access denied or error: ' + err.message);
            }
        });

        stopBtn.addEventListener('click', () => {
            if (mic) {
                mic.close();
            }
            startBtn.style.display = 'inline-block';
            stopBtn.style.display = 'none';
        });
    </script>
</body>
</html>
